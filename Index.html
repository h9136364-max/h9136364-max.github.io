<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Chaos Browser Ultra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #0a0e27;
            --darker: #050810;
            --accent: #00d4ff;
            --secondary: #ff006e;
            --green: #00ff88;
            --purple: #b537f2;
            --text: #ffffff;
            --text-dim: #b0b8c8;
            --bg-panel: rgba(20, 25, 50, 0.8);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* THEME SYSTEM */
        body.theme-dark {
            --accent: #00d4ff;
            --secondary: #ff006e;
            --dark: #0a0e27;
            --darker: #050810;
            --bg-panel: rgba(20, 25, 50, 0.8);
        }

        body.theme-neon-blue {
            --accent: #00ffff;
            --secondary: #0088ff;
            --dark: #0a0033;
            --darker: #000011;
            --bg-panel: rgba(0, 20, 60, 0.9);
        }

        body.theme-neon-purple {
            --accent: #b537f2;
            --secondary: #ff10f0;
            --dark: #1a0033;
            --darker: #0d001a;
            --bg-panel: rgba(40, 0, 80, 0.9);
        }

        body.theme-neon-green {
            --accent: #00ff88;
            --secondary: #00ffaa;
            --dark: #0a2a1a;
            --darker: #051510;
            --bg-panel: rgba(0, 40, 20, 0.9);
        }

        body.theme-cyber-red {
            --accent: #ff0055;
            --secondary: #ff3377;
            --dark: #2a0a0a;
            --darker: #150505;
            --bg-panel: rgba(60, 10, 20, 0.9);
        }

        body.theme-ocean-blue {
            --accent: #00ccff;
            --secondary: #0055ff;
            --dark: #0a1a3a;
            --darker: #050d20;
            --bg-panel: rgba(10, 30, 60, 0.9);
        }

        body.theme-sunset {
            --accent: #ff6b35;
            --secondary: #f7931e;
            --dark: #2a1a0a;
            --darker: #150d05;
            --bg-panel: rgba(50, 25, 10, 0.9);
        }

        body.theme-minimal-white {
            --accent: #333333;
            --secondary: #666666;
            --dark: #ffffff;
            --darker: #f5f5f5;
            --text: #333333;
            --text-dim: #777777;
            --bg-panel: rgba(245, 245, 245, 0.95);
            --glow: 0 0 10px rgba(51, 51, 51, 0.2);
        }

        body.theme-matrix-green {
            --accent: #00ff00;
            --secondary: #00dd00;
            --dark: #001a00;
            --darker: #000d00;
            --bg-panel: rgba(0, 30, 0, 0.95);
            --text: #00ff00;
        }

        body.theme-gradient-animated {
            --accent: #00d4ff;
            --secondary: #b537f2;
            --dark: #0a0e27;
            --darker: #050810;
            --bg-panel: rgba(20, 25, 50, 0.8);
            background: linear-gradient(-45deg, #0a0e27, #1a0055, #2a0a0a, #0a1a3a) !important;
            background-size: 400% 400% !important;
            animation: gradientShift 15s ease infinite !important;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* MAIN LAYOUT */
        .container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 250px;
            background: var(--bg-panel);
            border-right: 2px solid var(--accent);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: inset -10px 0 30px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            margin-bottom: 5px;
        }

        .sidebar-btn {
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .sidebar-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent);
            opacity: 0.2;
            transition: left 0.3s ease;
            z-index: -1;
        }

        .sidebar-btn:hover::before {
            left: 0;
        }

        .sidebar-btn:hover {
            box-shadow: var(--glow);
            transform: translateX(5px);
        }

        .sidebar-btn.active {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.8), rgba(5, 8, 16, 0.8));
        }

        .tab-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--accent);
            overflow-x: auto;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .tab-bar::-webkit-scrollbar {
            height: 6px;
        }

        .tab-bar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .tab {
            padding: 10px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: var(--glow);
        }

        .tab.active {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        .tab-close {
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .tab-close:hover {
            color: var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
        }

        .new-tab-btn {
            padding: 8px 12px;
            background: var(--accent);
            color: var(--darker);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            box-shadow: var(--glow);
        }

        .new-tab-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .loading-bar {
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--secondary), var(--accent));
            animation: loading 1.5s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loading-bar.active {
            opacity: 1;
        }

        @keyframes loading {
            0% { transform: scaleX(0); }
            50% { transform: scaleX(1); }
            100% { transform: scaleX(0); }
        }

        /* ADDRESS BAR */
        .address-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px 15px;
            background: var(--bg-panel);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
        }

        .nav-button {
            padding: 8px 12px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .nav-button:hover {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        .nav-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .address-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .address-input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow);
            border-color: var(--secondary);
        }

        .address-input::placeholder {
            color: var(--text-dim);
        }

        .fullscreen-btn, .reload-btn {
            padding: 8px 12px;
            background: rgba(181, 55, 242, 0.1);
            border: 1px solid var(--purple);
            color: var(--purple);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .fullscreen-btn:hover, .reload-btn:hover {
            background: var(--purple);
            color: var(--darker);
            box-shadow: 0 0 15px rgba(181, 55, 242, 0.6);
        }

        /* BROWSER IFRAME */
        .browser-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--darker);
            overflow: hidden;
            position: relative;
        }

        .iframe-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            border-radius: 8px;
            margin: 10px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .iframe-wrapper iframe {
            flex: 1;
            border: none;
            border-radius: 8px;
        }

        .browser-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* CONTENT PANELS */
        .content-panel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.3s ease;
        }

        .content-panel.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content-panel::-webkit-scrollbar {
            width: 8px;
        }

        .content-panel::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .content-panel::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }

        /* HISTORY */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            padding: 12px 15px;
            background: var(--bg-panel);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: rgba(0, 212, 255, 0.2);
            box-shadow: var(--glow);
            transform: translateX(5px);
        }

        .history-url {
            font-size: 0.9rem;
            word-break: break-all;
            color: var(--accent);
        }

        .history-time {
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .delete-history-btn {
            padding: 6px 10px;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
        }

        .delete-history-btn:hover {
            background: var(--secondary);
            color: var(--darker);
        }

        /* BOOKMARKS */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .bookmark-card {
            padding: 20px;
            background: var(--bg-panel);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .bookmark-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1), transparent);
            transition: var(--transition);
            z-index: 0;
        }

        .bookmark-card:hover::before {
            top: -50%;
            left: -50%;
            animation: shimmer 0.6s ease;
        }

        @keyframes shimmer {
            0% { transform: translate(-100%, -100%); }
            100% { transform: translate(100%, 100%); }
        }

        .bookmark-card:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
            transform: translateY(-5px) scale(1.05);
        }

        .bookmark-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .bookmark-url {
            font-size: 0.8rem;
            color: var(--text-dim);
            word-break: break-word;
            position: relative;
            z-index: 1;
        }

        .bookmark-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition);
            opacity: 0;
            z-index: 2;
        }

        .bookmark-card:hover .bookmark-delete {
            opacity: 1;
        }

        .bookmark-delete:hover {
            background: var(--secondary);
            color: var(--darker);
        }

        /* GAMES */
        .games-search {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .search-input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow);
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .category-btn {
            padding: 8px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .game-card {
            padding: 20px;
            background: var(--bg-panel);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 150px;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 212, 255, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .game-card:hover::before {
            opacity: 1;
            animation: glow-pulse 0.6s ease;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .game-card:hover {
            transform: scale(1.08) translateY(-8px);
            border-color: var(--secondary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 0 60px rgba(181, 55, 242, 0.3);
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            position: relative;
            z-index: 1;
        }

        .game-category {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        /* AI CHAT */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 15px;
        }

        .chat-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chat-mode-btn {
            padding: 8px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .chat-mode-btn.active {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        .chat-mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .clear-chat-btn {
            padding: 8px 15px;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
        }

        .clear-chat-btn:hover {
            background: var(--secondary);
            color: var(--darker);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: messageSlide 0.3s ease;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--accent);
            color: var(--darker);
            border: 1px solid var(--accent);
        }

        .message.ai .message-bubble {
            background: var(--bg-panel);
            color: var(--text);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .chat-input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow);
        }

        .chat-send-btn {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--darker);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: var(--glow);
        }

        .chat-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.8);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* SETTINGS */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .settings-section {
            padding: 20px;
            background: var(--bg-panel);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .settings-section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .settings-option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .settings-label {
            font-size: 0.95rem;
            color: var(--text);
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid var(--accent);
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s ease;
        }

        .toggle-switch.on {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--darker);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s ease;
        }

        .toggle-switch.on::after {
            left: 26px;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .theme-btn {
            padding: 12px 10px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid rgba(0, 212, 255, 0.3);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .theme-btn:hover {
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .theme-btn.active {
            background: var(--accent);
            color: var(--darker);
            border-color: var(--accent);
            box-shadow: var(--glow);
        }

        .danger-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .danger-btn {
            padding: 12px 15px;
            background: rgba(255, 0, 110, 0.1);
            border: 2px solid var(--secondary);
            color: var(--secondary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .danger-btn:hover {
            background: var(--secondary);
            color: var(--darker);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.6);
        }

        /* FULLSCREEN OVERLAY */
        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 8, 16, 0.95);
            z-index: 10000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--accent);
            gap: 15px;
        }

        .fullscreen-title {
            flex: 1;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .fullscreen-buttons {
            display: flex;
            gap: 10px;
        }

        .fullscreen-close-btn, .fullscreen-reload-btn, .fullscreen-fullscreen-btn {
            padding: 10px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .fullscreen-close-btn:hover, .fullscreen-reload-btn:hover, .fullscreen-fullscreen-btn:hover {
            background: var(--accent);
            color: var(--darker);
            box-shadow: var(--glow);
        }

        .fullscreen-iframe-container {
            flex: 1;
            overflow: hidden;
            display: flex;
        }

        .fullscreen-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* UTILITY */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--text-dim);
            padding: 40px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            outline: none;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: var(--glow);
        }

        .input-group button {
            padding: 12px 20px;
            background: var(--accent);
            color: var(--darker);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .input-group button:hover {
            transform: scale(1.05);
            box-shadow: var(--glow);
        }

        /* ANIMATIONS */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .sidebar {
            animation: slideIn 0.3s ease;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 100px;
                overflow-x: auto;
                overflow-y: hidden;
                flex-direction: row;
            }

            .main-content {
                flex: 1;
            }

            .bookmarks-grid,
            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                <button class="fullscreen-fullscreen-btn" id="fullscreen-fullscreen-btn">⛶ Exit Fullscreen</button>

    <script>
        // ========================================
        // STATE MANAGEMENT
        // ========================================
        const state = {
            tabs: [],
            currentTabId: null,
            history: [],
            bookmarks: [],
            chatHistory: [],
            chatMode: 'smart',
            animationsEnabled: true,
            performanceMode: false,
            soundsEnabled: true,
            aiPersonalityEnabled: true,
            thinkingDelayEnabled: true,
            currentTheme: 'dark',
        };

        // ========================================
        // INITIALIZATION
        // ========================================
        function initApp() {
            loadStateFromStorage();
            renderSidebar();
            renderTabs();
            renderGames();
            renderBookmarks();
            renderHistory();
            setupEventListeners();
            applyTheme(state.currentTheme);

            if (state.tabs.length === 0) {
                createNewTab();
            } else {
                switchToTab(state.tabs[0].id);
            }
        }

        // ========================================
        // STORAGE FUNCTIONS
        // ========================================
        function saveStateToStorage() {
            localStorage.setItem('nebula-state', JSON.stringify(state));
        }

        function loadStateFromStorage() {
            const saved = localStorage.getItem('nebula-state');
            if (saved) {
                Object.assign(state, JSON.parse(saved));
            }
        }

        // ========================================
        // TAB SYSTEM
        // ========================================
        function createNewTab() {
            const tab = {
                id: Date.now(),
                title: 'New Tab',
                url: 'about:blank',
                history: ['about:blank'],
                historyIndex: 0,
            };

            state.tabs.push(tab);
            state.currentTabId = tab.id;
            saveStateToStorage();
            renderTabs();
            switchToTab(tab.id);
            return tab;
        }

        function closeTab(tabId) {
            const index = state.tabs.findIndex(t => t.id === tabId);
            if (index === -1) return;

            state.tabs.splice(index, 1);

            if (state.currentTabId === tabId) {
                if (state.tabs.length > 0) {
                    state.currentTabId = state.tabs[Math.max(0, index - 1)].id;
                } else {
                    createNewTab();
                    return;
                }
            }

            saveStateToStorage();
            renderTabs();
            switchToTab(state.currentTabId);
        }

        function switchToTab(tabId) {
            state.currentTabId = tabId;
            const tab = state.tabs.find(t => t.id === tabId);
            if (tab) {
                document.getElementById('browser-iframe').src = tab.url;
                document.getElementById('address-input').value = tab.url;
                updateNavButtons();
                renderTabs();
                saveStateToStorage();
            }
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            state.tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab ${tab.id === state.currentTabId ? 'active' : ''}`;
                tabEl.innerHTML = `
                    <span>${tab.title}</span>
                    <span class="tab-close">×</span>
                `;

                tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(tab.id);
                });

                tabEl.addEventListener('click', () => switchToTab(tab.id));
                container.appendChild(tabEl);
            });
        }

        function updateTabTitle(tabId, title) {
            const tab = state.tabs.find(t => t.id === tabId);
            if (tab) {
                tab.title = title || 'New Tab';
                saveStateToStorage();
                renderTabs();
            }
        }

        // ========================================
        // BROWSER NAVIGATION
        // ========================================
        function navigateTo(url) {
            const tab = state.tabs.find(t => t.id === state.currentTabId);
            if (!tab) return;

            let finalUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('about:')) {
                if (url.includes('.') || url.includes('/')) {
                    finalUrl = 'https://' + url;
                } else {
                    finalUrl = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            tab.url = finalUrl;
            tab.history = tab.history.slice(0, tab.historyIndex + 1);
            tab.history.push(finalUrl);
            tab.historyIndex = tab.history.length - 1;

            document.getElementById('browser-iframe').src = finalUrl;
            document.getElementById('address-input').value = finalUrl;
            updateTabTitle(tab.id, extractDomain(finalUrl));

            addToHistory(finalUrl);
            updateNavButtons();
            saveStateToStorage();
        }

        function goBack() {
            const tab = state.tabs.find(t => t.id === state.currentTabId);
            if (tab && tab.historyIndex > 0) {
                tab.historyIndex--;
                const url = tab.history[tab.historyIndex];
                document.getElementById('browser-iframe').src = url;
                document.getElementById('address-input').value = url;
                updateNavButtons();
                saveStateToStorage();
            }
        }

        function goForward() {
            const tab = state.tabs.find(t => t.id === state.currentTabId);
            if (tab && tab.historyIndex < tab.history.length - 1) {
                tab.historyIndex++;
                const url = tab.history[tab.historyIndex];
                document.getElementById('browser-iframe').src = url;
                document.getElementById('address-input').value = url;
                updateNavButtons();
                saveStateToStorage();
            }
        }

        function reloadPage() {
            const iframe = document.getElementById('browser-iframe');
            iframe.src = iframe.src;
        }

        function updateNavButtons() {
            const tab = state.tabs.find(t => t.id === state.currentTabId);
            document.getElementById('back-btn').disabled = !tab || tab.historyIndex === 0;
            document.getElementById('forward-btn').disabled = !tab || tab.historyIndex === tab.history.length - 1;
        }

        function extractDomain(url) {
            try {
                const domain = new URL(url).hostname || url;
                return domain.replace('www.', '');
            } catch {
                return url.slice(0, 30);
            }
        }

        // ========================================
        // HISTORY SYSTEM
        // ========================================
        function addToHistory(url) {
            if (url === 'about:blank') return;

            state.history.unshift({
                url,
                timestamp: new Date().toISOString(),
            });

            if (state.history.length > 100) {
                state.history.pop();
            }

            saveStateToStorage();
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const searchQuery = document.getElementById('history-search')?.value.toLowerCase() || '';

            const filtered = state.history.filter(item =>
                item.url.toLowerCase().includes(searchQuery)
            );

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>No history found</p></div>';
                return;
            }

            list.innerHTML = filtered.map((item, index) => {
                const date = new Date(item.timestamp);
                const timeStr = date.toLocaleTimeString();

                return `
                    <div class="history-item">
                        <div style="flex: 1; cursor: pointer;" onclick="navigateToUrl('${item.url.replace(/'/g, "\\'")}')">
                            <div class="history-url">${item.url}</div>
                            <div class="history-time">${timeStr}</div>
                        </div>
                        <button class="delete-history-btn" onclick="deleteHistoryItem('${item.url.replace(/'/g, "\\'")}')">Delete</button>
                    </div>
                `;
            }).join('');
        }

        function navigateToUrl(url) {
            switchToTab(state.currentTabId);
            navigateTo(url);
        }

        function deleteHistoryItem(url) {
            state.history = state.history.filter(item => item.url !== url);
            saveStateToStorage();
            renderHistory();
        }

        // ========================================
        // BOOKMARK SYSTEM
        // ========================================
        function bookmarkCurrentPage() {
            const tab = state.tabs.find(t => t.id === state.currentTabId);
            if (!tab || tab.url === 'about:blank') return;

            const existing = state.bookmarks.find(b => b.url === tab.url);
            if (existing) {
                alert('Already bookmarked!');
                return;
            }

            state.bookmarks.push({
                id: Date.now(),
                title: tab.title,
                url: tab.url,
            });

            saveStateToStorage();
            renderBookmarks();
            playSound();
        }

        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');

            if (state.bookmarks.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⭐</div><p>No bookmarks yet</p></div>';
                return;
            }

            grid.innerHTML = state.bookmarks.map(bookmark => `
                <div class="bookmark-card">
                    <div class="bookmark-title" onclick="navigateToUrl('${bookmark.url.replace(/'/g, "\\'")}')">${bookmark.title}</div>
                    <div class="bookmark-url">${bookmark.url}</div>
                    <button class="bookmark-delete" onclick="deleteBookmark(${bookmark.id})">Delete</button>
                </div>
            `).join('');
        }

        function deleteBookmark(id) {
            state.bookmarks = state.bookmarks.filter(b => b.id !== id);
            saveStateToStorage();
            renderBookmarks();
        }

        // ========================================
        // GAMES SYSTEM
        // ========================================
        const games = [
            { id: 1, title: 'Pac-Man', category: 'action', url: 'https://pacman.cc/play' },
            { id: 2, title: 'Snake Game', category: 'casual', url: 'https://playsnakegame.org/' },
            { id: 3, title: 'Flappy Bird', category: 'action', url: 'https://flappybird.io/' },
            { id: 4, title: '2048', category: 'puzzle', url: 'https://play2048.co/' },
            { id: 5, title: 'Tetris', category: 'puzzle', url: 'https://tetris.com/play-tetris' },
            { id: 6, title: 'Breakout', category: 'action', url: 'https://breakout.psyduck.me/' },
            { id: 7, title: 'Asteroids', category: 'action', url: 'https://www.freeasteroids.org/' },
            { id: 8, title: 'Dino Game', category: 'casual', url: 'https://chromedino.com/' },
            { id: 9, title: 'Chess', category: 'puzzle', url: 'https://www.chess.com/play/online' },
            { id: 10, title: 'Wordle', category: 'puzzle', url: 'https://www.nytimes.com/games/wordle/index.html' },
            { id: 11, title: 'Agar.io', category: 'fun', url: 'https://agar.io/' },
            { id: 12, title: 'Slither.io', category: 'fun', url: 'https://slither.io/' },
        ];

        function renderGames() {
            const grid = document.getElementById('games-grid');
            const searchQuery = document.getElementById('game-search')?.value.toLowerCase() || '';
            const selectedCategory = document.querySelector('.category-btn.active')?.dataset.category || 'all';

            const filtered = games.filter(game => {
                const matchesSearch = game.title.toLowerCase().includes(searchQuery);
                const matchesCategory = selectedCategory === 'all' || game.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎮</div><p>No games found</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(game => `
                <div class="game-card" onclick="openGameFullscreen('${game.title}', '${game.url.replace(/'/g, "\\'")}')">
                    <div class="game-title">${game.title}</div>
                    <div class="game-category">${game.category}</div>
                </div>
            `).join('');
        }

        function openGameFullscreen(title, url) {
            const overlay = document.getElementById('fullscreen-overlay');
            overlay.classList.add('active');
            document.getElementById('fullscreen-title').textContent = `🎮 ${title}`;
            document.getElementById('fullscreen-iframe').src = url;
            playSound();
        }

        function closeGameFullscreen() {
            document.getElementById('fullscreen-overlay').classList.remove('active');
            document.getElementById('fullscreen-iframe').src = '';
        }

        // ========================================
        // AI CHAT SYSTEM
        // ========================================
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message) return;

            // Add user message
            state.chatHistory.push({ role: 'user', content: message });
            renderMessages();
            input.value = '';

            // Simulate thinking delay
            const thinkingDelay = state.thinkingDelayEnabled ? 800 + Math.random() * 700 : 0;

            setTimeout(() => {
                const response = generateAIResponse(message);
                state.chatHistory.push({ role: 'ai', content: response });
                renderMessages();
                saveStateToStorage();
            }, thinkingDelay);

            saveStateToStorage();
        }

        function generateAIResponse(message) {
            const msg = message.toLowerCase();

            // Math solving
            if (msg.match(/[\d\+\-\*\/\(\)]/)) {
                try {
                    const result = Function('"use strict"; return (' + message + ')')();
                    if (!isNaN(result)) {
                        return `The answer is: ${result}`;
                    }
                } catch (e) {
                    // Continue to other responses
                }
            }

            // Simple responses
            const responses = {
                'hello': 'Hey there! How can I help you today?',
                'hi': 'Greetings, human! What can I do for you?',
                'help': 'I can help with math, answer questions, or just chat. Try asking me something!',
                'time': `The current time is ${new Date().toLocaleTimeString()}`,
                'date': `Today is ${new Date().toLocaleDateString()}`,
                'who are you': 'I\'m Nebula AI, your cosmic assistant! I\'m here to help with whatever you need.',
                'what is your name': 'My name is Nebula! Nice to meet you!',
            };

            for (const [key, value] of Object.entries(responses)) {
                if (msg.includes(key)) {
                    return value;
                }
            }

            // Context-aware responses
            if (state.chatHistory.length > 1) {
                const lastUserMessage = state.chatHistory[state.chatHistory.length - 2]?.content || '';
                if (lastUserMessage.includes('game')) {
                    return 'Games are fun! I can help you find new ones or discuss your favorites.';
                }
                if (lastUserMessage.includes('browser')) {
                    return 'This browser is pretty cool, isn\'t it? You can browse, play games, and chat with me!';
                }
            }

            // Mode-specific responses
            const modes = {
                smart: [
                    'That\'s an interesting question. Let me think about that...',
                    'I believe you might find that question interesting to explore further.',
                    'That\'s something worth considering!',
                ],
                funny: [
                    'Haha, nice try! But I\'m not sure how to respond to that! 😄',
                    'That\'s hilarious! But I need a better question! 🤣',
                    'LOL, I\'m processing that with a 404 error in my brain! 🧠',
                ],
                serious: [
                    'That is a matter requiring careful consideration.',
                    'I acknowledge your inquiry. Further context would be beneficial.',
                    'Your question raises valid points. Proceed with caution.',
                ],
            };

            const modeResponses = modes[state.chatMode] || modes.smart;
            return modeResponses[Math.floor(Math.random() * modeResponses.length)];
        }

        function renderMessages() {
            const container = document.getElementById('messages');

            if (state.chatHistory.length === 0) {
                container.innerHTML = '<div class="empty-state" style="justify-content: center;"><p>Start a conversation! 💬</p></div>';
                return;
            }

            container.innerHTML = state.chatHistory.map(msg => `
                <div class="message ${msg.role}">
                    <div class="message-bubble">${msg.content}</div>
                </div>
            `).join('');

            container.scrollTop = container.scrollHeight;
        }

        function clearChatHistory() {
            if (confirm('Clear all chat history?')) {
                state.chatHistory = [];
                renderMessages();
                saveStateToStorage();
            }
        }

        // ========================================
        // SETTINGS SYSTEM
        // ========================================
        function applyTheme(theme) {
            document.body.className = `theme-${theme}`;
            state.currentTheme = theme;
            saveStateToStorage();
        }

        function toggleSetting(setting) {
            if (setting === 'animations') {
                state.animationsEnabled = !state.animationsEnabled;
                document.body.style.animation = state.animationsEnabled ? '' : 'none';
            } else if (setting === 'performance') {
                state.performanceMode = !state.performanceMode;
            } else if (setting === 'sounds') {
                state.soundsEnabled = !state.soundsEnabled;
            } else if (setting === 'ai-personality') {
                state.aiPersonalityEnabled = !state.aiPersonalityEnabled;
            } else if (setting === 'thinking-delay') {
                state.thinkingDelayEnabled = !state.thinkingDelayEnabled;
            }

            saveStateToStorage();
            renderSettings();
        }

        function renderSettings() {
            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                const setting = toggle.dataset.setting;
                const isOn = state[setting.replace('-', '')] || state[setting.replace(/-/g, '')];

                if (
                    (setting === 'animations' && state.animationsEnabled) ||
                    (setting === 'performance' && state.performanceMode) ||
                    (setting === 'sounds' && state.soundsEnabled) ||
                    (setting === 'ai-personality' && state.aiPersonalityEnabled) ||
                    (setting === 'thinking-delay' && state.thinkingDelayEnabled)
                ) {
                    toggle.classList.add('on');
                } else {
                    toggle.classList.remove('on');
                }
            });
        }

        function resetAllData() {
            if (confirm('⚠️ This will delete ALL data. Are you sure?')) {
                if (confirm('FINAL WARNING: This cannot be undone!')) {
                    localStorage.removeItem('nebula-state');
                    location.reload();
                }
            }
        }

        // ========================================
        // SIDEBAR & PAGE NAVIGATION
        // ========================================
        function renderSidebar() {
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const page = btn.dataset.page;
                    switchPage(page);
                    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }

        function switchPage(page) {
            document.querySelectorAll('.content-panel').forEach(panel => {
                panel.classList.remove('active');
            });

            const pageId = page === 'browser' ? 'browser-page' : `${page}-page`;
            document.getElementById(pageId)?.classList.add('active');
        }

        // ========================================
        // EVENT LISTENERS
        // ========================================
        function setupEventListeners() {
            // TAB CONTROLS
            document.getElementById('new-tab-btn').addEventListener('click', createNewTab);

            // NAVIGATION
            document.getElementById('back-btn').addEventListener('click', goBack);
            document.getElementById('forward-btn').addEventListener('click', goForward);
            document.getElementById('reload-btn').addEventListener('click', reloadPage);

            // ADDRESS BAR
            document.getElementById('address-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    navigateTo(e.target.value);
                }
            });

            document.getElementById('iframe-fullscreen-btn').addEventListener('click', () => {
                const tab = state.tabs.find(t => t.id === state.currentTabId);
                if (tab) {
                    openGameFullscreen(tab.title, tab.url);
                }
            });

            // GAME SEARCH & FILTER
            const gameSearch = document.getElementById('game-search');
            if (gameSearch) {
                gameSearch.addEventListener('input', renderGames);
            }

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderGames();
                });
            });

            // FULLSCREEN CONTROLS
            document.getElementById('fullscreen-close-btn').addEventListener('click', closeGameFullscreen);
            document.getElementById('fullscreen-reload-btn').addEventListener('click', () => {
                const iframe = document.getElementById('fullscreen-iframe');
                iframe.src = iframe.src;
            });

            document.getElementById('fullscreen-fullscreen-btn').addEventListener('click', () => {
                const container = document.querySelector('.fullscreen-iframe-container');
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(() => {});
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                }
            });

            // CHAT
            document.getElementById('chat-send-btn').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            document.getElementById('clear-chat-btn').addEventListener('click', clearChatHistory);

            document.querySelectorAll('.chat-mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.chat-mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.chatMode = btn.dataset.mode;
                    saveStateToStorage();
                });
            });

            // HISTORY SEARCH
            const historySearch = document.getElementById('history-search');
            if (historySearch) {
                historySearch.addEventListener('input', renderHistory);
            }

            document.getElementById('clear-all-history-btn').addEventListener('click', () => {
                if (confirm('Clear all history?')) {
                    state.history = [];
                    saveStateToStorage();
                    renderHistory();
                }
            });

            // THEMES
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    applyTheme(btn.dataset.theme);
                });
            });

            // TOGGLES
            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                toggle.addEventListener('click', () => {
                    toggleSetting(toggle.dataset.setting);
                });
            });

            // DANGER BUTTONS
            document.getElementById('reset-tabs-btn').addEventListener('click', () => {
                if (confirm('Reset all tabs?')) {
                    state.tabs = [];
                    state.currentTabId = null;
                    createNewTab();
                }
            });

            document.getElementById('reset-bookmarks-btn').addEventListener('click', () => {
                if (confirm('Clear all bookmarks?')) {
                    state.bookmarks = [];
                    saveStateToStorage();
                    renderBookmarks();
                }
            });

            document.getElementById('reset-history-btn').addEventListener('click', () => {
                if (confirm('Clear all history?')) {
                    state.history = [];
                    saveStateToStorage();
                    renderHistory();
                }
            });

            document.getElementById('reset-chat-btn').addEventListener('click', () => {
                if (confirm('Clear chat history?')) {
                    state.chatHistory = [];
                    saveStateToStorage();
                    renderMessages();
                }
            });

            document.getElementById('clear-all-data-btn').addEventListener('click', resetAllData);
        }

        // ========================================
        // UTILITY FUNCTIONS
        // ========================================
        function playSound() {
            if (!state.soundsEnabled) return;
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();

            oscillator.connect(gain);
            gain.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        // ========================================
        // START APPLICATION
        // ========================================
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
